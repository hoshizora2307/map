async function apiGet() {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { 'X-Access-Key': ACCESS_KEY }
  });
  if (!r.ok) throw new Error('取得失敗: ' + r.status);

  const rec = d.record;
  if (!Array.isArray(rec)) return [];
  return rec.filter(s => !s._placeholder && !s.init);
}

async function apiPut(data) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Access-Key': ACCESS_KEY },
    body: JSON.stringify(data.length === 0 ? [{ _placeholder: true }] : data),
  });
  if (!r.ok) throw new Error('保存失敗: ' + r.status);
}

function resizeImg(file, max = 800, q = 0.75) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
        else if (h > max) { w = Math.round(w * max / h); h = max; }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        res(cv.toDataURL('image/jpeg', q));
      };
      img.onerror = rej;
      img.src = e.target.result;
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function geoOnce(addr) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=jp&q=${encodeURIComponent(addr)}`;
  const r = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
  if (!r.ok) throw new Error('geo');
  const d = await r.json();
  if (!d || d.length === 0) return null;
  return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
}

async function geocode(addr) {
  const t = (addr || '').trim();
  if (!t) return null;
  const first = await geoOnce(t);
  if (first) return first;
  let s = t;
  for (let i = 0; i < 3; i++) {
    const n = s.replace(/[0-9０-９\-－ー番地号棟号室\s]+$/u, '');
    if (!n || n === s) break;
    s = n;
    const c = await geoOnce(s);
    if (c) return c;
  }
  return null;
}

function haversine(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const lat1 = a.lat * Math.PI / 180;
  const lat2 = b.lat * Math.PI / 180;
  const s1 = Math.sin(dLat / 2), s2 = Math.sin(dLng / 2);
  return 2 * R * Math.asin(Math.sqrt(s1 * s1 + Math.cos(lat1) * Math.cos(lat2) * s2 * s2));
}

function buildRoute(start, stops) {
  const rem = stops.filter(s => typeof s.lat === 'number' && typeof s.lng === 'number' && !isNaN(s.lat));
  const order = [];
  let cur = start;
  while (rem.length > 0) {
    let bi = 0, bd = Infinity;
    rem.forEach((s, i) => {
      const d = haversine(cur, s);
      if (d < bd) { bd = d; bi = i; }
    });
    const n = rem.splice(bi, 1)[0];
    order.push(Object.assign({}, n, { legKm: bd }));
    cur = n;
  }
  return order;
}

let _tfP = null;
function loadTF() {
  if (window.tf && window.mobilenet) return Promise.resolve();
  if (_tfP) return _tfP;
  _tfP = new Promise((res, rej) => {
    const s1 = document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.17.0/tf.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
      s2.onload = res; s2.onerror = rej;
      document.head.appendChild(s2);
    };
    s1.onerror = rej;
    document.head.appendChild(s1);
  });
  return _tfP;
}
let _model = null;
async function getModel() {
  await loadTF();
  if (!_model) _model = await window.mobilenet.load({ version: 2, alpha: 1.0 });
  return _model;
}
function embedFromDataUrl(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = async () => {
      try {
        const m = await getModel();
        const emb = m.infer(img, true);
        const arr = await emb.data();
        emb.dispose();
        res(Array.from(arr));
      } catch (e) { rej(e); }
    };
    img.onerror = rej;
    img.src = url;
  });
}
function cosineSim(a, b) {
  if (!a || !b || a.length !== b.length) return -1;
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i];
  }
  if (na === 0 || nb === 0) return -1;
  return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

function el(tag, props, children) {
  const e = document.createElement(tag);
  if (props) {
    for (const k in props) {
      if (k === 'style' && typeof props[k] === 'object') Object.assign(e.style, props[k]);
      else if (k === 'onclick') e.onclick = props[k];
      else if (k === 'onchange') e.onchange = props[k];
      else if (k === 'oninput') e.oninput = props[k];
      else if (k === 'onsubmit') e.onsubmit = props[k];
      else if (k in e) e[k] = props[k];
      else e.setAttribute(k, props[k]);
    }
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null || c === false) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = el('div', { className: 'toast' }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function setTab(name) {
  state.currentTab = name;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === name));
  const labels = { map: '地図', list: '仕入先一覧', photos: '商品写真', camera: 'カメラ照合', route: 'ルート提案' };
  document.getElementById('topSub').textContent = labels[name];
  renderView(name);
  if (name === 'map' && state.mapObj) setTimeout(() => state.mapObj.invalidateSize(), 100);
  if (name === 'route' && state.routeMapObj) setTimeout(() => state.routeMapObj.invalidateSize(), 100);
}

function renderView(name) {
  if (name === 'map') renderMap();
  else if (name === 'list') renderList();
  else if (name === 'photos') renderPhotos();
  else if (name === 'camera') renderCamera();
  else if (name === 'route') renderRoute();
}

function renderMap() {
  if (!state.mapObj) {
    const map = L.map('mainMap', { center: [36.35, 137.9], zoom: 9, zoomControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors', maxZoom: 19,
    }).addTo(map);
    state.mapObj = map;
  }
  state.mapMarkers.forEach(m => m.remove());
  state.mapMarkers = [];
  state.suppliers.forEach(s => {
    if (typeof s.lat !== 'number' || isNaN(s.lat)) return;
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:38px;height:38px;border-radius:12px;background:${catColor(s.category)};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:700;">${(s.name || '?').slice(0, 1)}</div>`,
      iconSize: [38, 38], iconAnchor: [19, 19],

    state.mapMarkers.push(m);
  });

}

function renderCamera() {
  const scroll = document.getElementById('camScroll');
  scroll.innerHTML = '';

  const allProducts = state.suppliers.flatMap(s =>
    (s.products || []).map(p => Object.assign({}, p, { supplierName: s.name, supplierId: s.id }))
  );
  const registered = allProducts.filter(p => p.embedding).length;

  const intro = el('div', { className: 'card' });

  if (registered === 0) {

      'まだ照合できる商品写真がありません。仕入先を編集して写真を登録してください。'));
  }

  const stage = el('div', { className: 'cam-stage' });

    stage.appendChild(el('img', { src: state.captured, alt: '撮影' }));
  } else if (state.camStream) {
    const video = el('video', { autoplay: true, playsinline: true, muted: true });

    stage.appendChild(video);
    setTimeout(() => video.play().catch(() => {}), 50);
  } else {
    stage.appendChild(el('div', { className: 'cam-placeholder' }, 'カメラを起動してください'));
  }
  scroll.appendChild(stage);

  if (state.camErr) scroll.appendChild(el('div', { className: 'err-msg' }, state.camErr));

  const btns = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } });

    btns.appendChild(el('button', { className: 'btn-primary', onclick: startCam }, '📷 カメラを起動する'));
  }
  if (!state.captured && state.camStream) {
    btns.appendChild(el('button', { className: 'btn-primary', onclick: capture }, '📸 撮影して照合する'));
  }
  if (!state.captured) {
    const lbl = el('label', { className: 'btn-outline' }, '写真を選んで照合する');
    const inp = el('input', { type: 'file', accept: 'image/*', capture: 'environment', style: { display: 'none' } });
    inp.onchange = handleFileCapture;
    lbl.appendChild(inp);
    btns.appendChild(lbl);
  }
  if (state.captured) {
    btns.appendChild(el('button', { className: 'btn-outline', onclick: resetCam }, 'もう一度撮影する'));
  }
  scroll.appendChild(btns);

  if (state.analyzing || state.modelLoading) {
    scroll.appendChild(el('div', { className: 'loading-msg' },
      state.modelLoading ? 'AIモデルを準備中…（初回のみ時間がかかります）' : '照合中…'));
  }

  if (state.matches && state.matches.length === 0) {
    scroll.appendChild(el('div', { className: 'match-card empty', style: { textAlign: 'center' } },
      '候補が見つかりませんでした'));
  }
  if (state.matches && state.matches.length > 0) {
    const box = el('div', { className: 'match-card' });
    box.appendChild(el('div', { className: 'match-title' }, '発注先の候補'));
    state.matches.forEach((m, i) => {
      const s = state.suppliers.find(x => x.id === m.supplierId);

    scroll.appendChild(box);
  }
}

async function startCam() {
  state.camErr = null; state.matches = null; state.captured = null;
  try {
    const st = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }, audio: false
    });
    state.camStream = st;
    renderCamera();
  } catch (e) {
    state.camErr = 'カメラを起動できませんでした。ブラウザの設定をご確認ください。';
    renderCamera();
  }
}

function stopCam() {
  if (state.camStream) {
    state.camStream.getTracks().forEach(t => t.stop());
    state.camStream = null;
  }
}

async function capture() {
  const video = document.querySelector('#camScroll video');
  if (!video) return;
  const cv = document.createElement('canvas');
  cv.width = video.videoWidth; cv.height = video.videoHeight;
  cv.getContext('2d').drawImage(video, 0, 0);
  const url = cv.toDataURL('image/jpeg', 0.85);
  state.captured = url;
  stopCam();
  renderCamera();
  await runMatch(url);
}

async function handleFileCapture(e) {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  const url = await resizeImg(f, 700, 0.8);
  state.captured = url;
  state.matches = null;
  renderCamera();
  await runMatch(url);
  e.target.value = '';
}

async function runMatch(url) {
  const allProducts = state.suppliers.flatMap(s =>
    (s.products || []).map(p => Object.assign({}, p, { supplierName: s.name, supplierId: s.id }))
  );
  const cands = allProducts.filter(p => p.embedding);
  if (cands.length === 0) { state.matches = []; renderCamera(); return; }
  state.analyzing = true; state.modelLoading = true;
  renderCamera();
  try {
    const emb = await embedFromDataUrl(url);
    state.modelLoading = false;
    const scored = cands
      .map(p => Object.assign({}, p, { score: cosineSim(emb, p.embedding) }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 3);
    state.matches = scored;
  } catch (e) {
    state.matches = [];
    state.camErr = '解析に失敗しました。もう一度お試しください。';
  } finally {
    state.analyzing = false; state.modelLoading = false;
    renderCamera();
  }
}

function resetCam() {
  state.captured = null;
  state.matches = null;
  state.camErr = null;
  renderCamera();
}

  }, '🚗 ルートを提案する'));

    if (gmapUrl) {

function buildGmapUrl(start, result) {
  if (!start || !result || result.length === 0) return null;
  const params = new URLSearchParams();
  params.set('api', '1');
  params.set('travelmode', 'driving');
  params.set('origin', `${start.lat},${start.lng}`);
  const last = result[result.length - 1];
  params.set('destination', `${last.lat},${last.lng}`);
  if (result.length > 1) {
    const waypoints = result.slice(0, -1).map(r => `${r.lat},${r.lng}`).join('|');
    params.set('waypoints', waypoints);
  }
  return 'https://www.google.com/maps/dir/?' + params.toString();
}

function drawRouteOnMap() {
  if (!state.routeMapObj) return;
  state.routeMarkers.forEach(m => m.remove());
  state.routeMarkers = [];
  if (state.routeLine) { state.routeLine.remove(); state.routeLine = null; }
  if (!state.routeResult || !state.routeStartCoord) return;
  const valid = state.routeResult.filter(r => typeof r.lat === 'number' && !isNaN(r.lat));
  if (valid.length === 0) return;
  const pts = [state.routeStartCoord].concat(valid.map(r => ({ lat: r.lat, lng: r.lng })));
  const lls = pts.map(p => [p.lat, p.lng]);
  state.routeLine = L.polyline(lls, { color: '#D98E2B', weight: 4, dashArray: '8 6' }).addTo(state.routeMapObj);
  const si = L.divIcon({
    className: '',
    html: `<div style="width:34px;height:34px;border-radius:50%;background:#1F2E26;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.4)">出発</div>`,
    iconSize: [34, 34], iconAnchor: [17, 17]
  });
  state.routeMarkers.push(L.marker([state.routeStartCoord.lat, state.routeStartCoord.lng], { icon: si }).addTo(state.routeMapObj));
  valid.forEach((s, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:34px;height:34px;border-radius:10px;background:${catColor(s.category)};border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.35)">${i + 1}</div>`,
      iconSize: [34, 34], iconAnchor: [17, 17]
    });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(state.routeMapObj);
    m.bindPopup(`<div style="font-family:sans-serif"><b>${i + 1}. ${escapeHtml(s.name)}</b><br/>${escapeHtml(s.address || '')}</div>`);
    state.routeMarkers.push(m);
  });
  state.routeMapObj.fitBounds(lls, { padding: [40, 40] });
}

async function calculateRoute() {
  if (state.routeStops.length === 0) { showToast('仕入先を1件以上選んでください'); return; }
  try {
    let sc = state.routeStartCoord;
    if (!sc || isNaN(sc.lat)) {
      if (!state.routeStart.trim()) { showToast('出発地点を入力してください'); return; }
      sc = await geocode(state.routeStart);
      if (!sc) { showToast('出発地点の位置を特定できませんでした'); state.routeStartCoord = null; return; }
      state.routeStartCoord = sc;
    }
    const all = state.suppliers.filter(s => state.routeStops.indexOf(s.id) >= 0);
    const valid = all.filter(s => typeof s.lat === 'number' && !isNaN(s.lat));
    if (valid.length === 0) { showToast('選択した仕入先に位置情報がありません'); return; }
    const skip = all.length - valid.length;
    state.routeResult = buildRoute(sc, valid);
    if (skip > 0) showToast(`位置情報のない ${skip} 件を除外して計算しました`);
    renderRoute();
  } catch (e) {
    showToast('エラーが発生しました');
  }
}

function openDetail(id) {
  const s = state.suppliers.find(x => x.id === id);
  if (!s) return;
  const sheet = document.getElementById('detailSheet');
  sheet.innerHTML = '';
  sheet.appendChild(el('div', { className: 'sheet-grip' }));
  sheet.appendChild(el('div', { className: 'sheet-header' }, [
    el('div', {
      className: 'cat-chip',
      style: { background: catColor(s.category) + '22', color: catColor(s.category), marginBottom: 0 }
    }, catLabel(s.category)),
    el('button', { className: 'sheet-close', onclick: closeDetail }, '×')
  ]));
  const body = el('div', { className: 'sheet-body' });
  body.appendChild(el('div', { style: { fontWeight: 700, fontSize: '20px', marginBottom: '14px' } }, s.name || ''));
  const fields = [
    ['📍 住所', s.address],
    ['📞 電話', s.phone],
    ['⏰ 営業時間', s.hours],
    ['🚫 定休日', s.closedDay],
    ['👤 担当者', s.contact],
    ['📝 メモ', s.notes],
  ];
  fields.forEach(([label, val]) => {
    if (!val) return;
    const line = el('div', { className: 'detail-line' });
    line.appendChild(el('div', { className: 'detail-label' }, label));
    line.appendChild(el('div', { className: 'detail-value' }, val));
    body.appendChild(line);
  });
  if (s.website) {
    body.appendChild(el('a', {
      href: s.website, target: '_blank', rel: 'noreferrer', className: 'detail-link'
    }, '🔗 ホームページ ↗'));
  }
  if (typeof s.lat === 'number' && !isNaN(s.lat)) {
    body.appendChild(el('a', {
      href: `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`,
      target: '_blank', rel: 'noreferrer', className: 'route-gmap'
    }, '🌐 Googleマップで経路案内'));
  }
  if (s.products && s.products.length > 0) {
    body.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--soft)', marginTop: '16px', marginBottom: '8px' } }, '🛒 取扱商品'));
    const grid = el('div', { className: 'detail-products' });
    s.products.forEach(p => {
      const w = el('div', { className: 'detail-product' });
      w.appendChild(el('img', { src: p.image, alt: p.name }));
      w.appendChild(el('div', { className: 'detail-product-name' }, p.name));
      grid.appendChild(w);
    });
    body.appendChild(grid);
  }
  const actions = el('div', { className: 'detail-actions' });
  actions.appendChild(el('button', {
    className: 'btn-primary',
    onclick: () => { closeDetail(); openForm(s); }
  }, '編集'));
  actions.appendChild(el('button', {
    className: 'btn-danger-outline',
    onclick: () => { closeDetail(); handleDelete(s.id); }
  }, '削除'));
  body.appendChild(actions);
  sheet.appendChild(body);
  document.getElementById('detailOverlay').classList.add('active');
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
}

function openForm(initial) {
  state.editTarget = initial || null;
  const form = initial ? Object.assign({}, initial, { products: (initial.products || []).slice() }) : {
    name: '', category: 'vegetable', address: '', phone: '', hours: '',
    closedDay: '', contact: '', website: '', notes: '', products: [],
    lat: null, lng: null
  };
  const sheet = document.getElementById('formSheet');
  sheet.innerHTML = '';

  const container = el('form', {
    style: { display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden' },
    onsubmit: e => { e.preventDefault(); submitForm(form); }
  });

  container.appendChild(el('div', { className: 'sheet-grip' }));
  const header = el('div', { className: 'sheet-header' });
  header.appendChild(el('div', { className: 'sheet-title' }, initial ? '仕入先を編集' : '仕入先を新規登録'));
  header.appendChild(el('button', { type: 'button', className: 'sheet-close', onclick: closeForm }, '×'));
  container.appendChild(header);

  const body = el('div', { className: 'sheet-body' });

  body.appendChild(makeField('仕入先名 *',
    el('input', { className: 'input', value: form.name, required: true,
      placeholder: '例：信州たまご農場',
      oninput: e => form.name = e.target.value })));

  const catSel = el('select', {
    className: 'input',
    onchange: e => form.category = e.target.value
  });
  CATS.forEach(c => {
    const o = el('option', { value: c.key }, c.label);
    if (c.key === form.category) o.selected = true;
    catSel.appendChild(o);
  });
  body.appendChild(makeField('主な品目', catSel));

  body.appendChild(makeField('住所',
    el('input', { className: 'input', value: form.address,
      placeholder: '例：長野県大町市常盤7000',
      oninput: e => form.address = e.target.value }),
    '保存時に自動で地図ピンを生成'));

  const row1 = el('div', { className: 'field-row2' });
  row1.appendChild(makeField('電話番号',
    el('input', { className: 'input', type: 'tel', value: form.phone,
      placeholder: '0261-00-0000', oninput: e => form.phone = e.target.value })));
  row1.appendChild(makeField('担当者名',
    el('input', { className: 'input', value: form.contact, placeholder: '〇〇 様',
      oninput: e => form.contact = e.target.value })));
  body.appendChild(row1);

  const row2 = el('div', { className: 'field-row2' });
  row2.appendChild(makeField('営業時間',
    el('input', { className: 'input', value: form.hours, placeholder: '9:00-18:00',
      oninput: e => form.hours = e.target.value })));
  row2.appendChild(makeField('定休日',
    el('input', { className: 'input', value: form.closedDay, placeholder: '水曜',
      oninput: e => form.closedDay = e.target.value })));
  body.appendChild(row2);

  body.appendChild(makeField('ホームページ',
    el('input', { className: 'input', type: 'url', value: form.website,
      placeholder: 'https://...', oninput: e => form.website = e.target.value })));

  body.appendChild(makeField('メモ',
    el('textarea', { className: 'input', value: form.notes,
      oninput: e => form.notes = e.target.value })));

  const photoSection = el('div');
  const photoLabel = el('label', { className: 'btn-outline' }, '＋ 写真を追加（タップ）');
  const photoInput = el('input', { type: 'file', accept: 'image/*', style: { display: 'none' } });
  photoInput.onchange = async e => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    photoLabel.textContent = '解析中…';
    try {
      const url = await resizeImg(f, 800, 0.75);
      const name = window.prompt('商品名を入力してください', f.name.replace(/\.[^.]+$/, '')) || f.name;
      let emb = null;
      try { emb = await embedFromDataUrl(url); } catch (err) {}
      form.products.push({ id: uid(), name, image: url, embedding: emb });
      renderThumbs();
    } catch (err) {
      window.alert('画像の読み込みに失敗しました');
    } finally {
      photoLabel.textContent = '＋ 写真を追加（タップ）';
      e.target.value = '';
    }
  };
  photoLabel.appendChild(photoInput);
  photoSection.appendChild(photoLabel);
  const thumbsWrap = el('div', { className: 'thumbs' });
  photoSection.appendChild(thumbsWrap);

  function renderThumbs() {
    thumbsWrap.innerHTML = '';
    form.products.forEach(p => {
      const t = el('div', { className: 'thumb' });
      t.appendChild(el('img', { src: p.image, alt: p.name }));
      t.appendChild(el('div', { className: 'thumb-name' }, p.name));
      t.appendChild(el('button', {
        type: 'button', className: 'thumb-del',
        onclick: () => { form.products = form.products.filter(x => x.id !== p.id); renderThumbs(); }
      }, '×'));
      thumbsWrap.appendChild(t);
    });
  }
  renderThumbs();
  body.appendChild(makeField('商品写真', photoSection, '在庫確認・照合に使います'));

  container.appendChild(body);

  const footer = el('div', { className: 'sheet-footer' });
  footer.appendChild(el('button', {
    type: 'button', className: 'btn-outline', style: { flex: 1, marginTop: 0 }, onclick: closeForm
  }, 'キャンセル'));
  const submitBtn = el('button', {
    type: 'submit', className: 'btn-primary', style: { flex: 2 }
  }, '保存する');
  footer.appendChild(submitBtn);
  container.appendChild(footer);

  sheet.appendChild(container);
  document.getElementById('formOverlay').classList.add('active');
}

function makeField(label, control, hint) {
  const f = el('div', { className: 'field' });
  const lbl = el('div', { className: 'field-label' }, label);
  if (hint) lbl.appendChild(el('span', { className: 'field-hint' }, hint));
  f.appendChild(lbl);
  f.appendChild(control);
  return f;
}

function closeForm() {
  document.getElementById('formOverlay').classList.remove('active');
  state.editTarget = null;
}

async function submitForm(form) {
  if (!(form.name || '').trim()) {
    window.alert('仕入先名を入力してください');
    return;
  }
  let { lat, lng } = form;
  if ((lat == null || lng == null) && form.address) {
    try {
      const c = await geocode(form.address);
      if (c) { lat = c.lat; lng = c.lng; }
      else showToast('住所から位置を特定できませんでした');
    } catch { showToast('位置情報の取得に失敗しました'); }
  }
  const record = Object.assign({}, form, { lat, lng });
  const next = state.editTarget
    ? state.suppliers.map(s => s.id === state.editTarget.id ? Object.assign({}, record, { id: s.id }) : s)
    : state.suppliers.concat([Object.assign({}, record, { id: uid() })]);
  state.suppliers = next;
  try {
    await apiPut(next);
    showToast(state.editTarget ? '更新しました' : '登録しました');
  } catch {
    showToast('サーバーへの保存に失敗しました');
  }
  closeForm();
  renderView(state.currentTab);
}

async function handleDelete(id) {
  if (!window.confirm('この仕入先を削除しますか？')) return;
  state.suppliers = state.suppliers.filter(s => s.id !== id);
  try {
    await apiPut(state.suppliers);
    showToast('削除しました');
  } catch {
    showToast('保存に失敗しました');
  }
  renderView(state.currentTab);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

async function init() {
  document.querySelectorAll('.tab').forEach(b => {
    b.onclick = () => setTab(b.dataset.tab);
  });
  document.getElementById('btnAdd').onclick = () => openForm(null);
  document.getElementById('detailOverlay').onclick = e => {
    if (e.target.id === 'detailOverlay') closeDetail();
  };
  try {
    const data = await apiGet();
    if (data && data.length > 0) {
      state.suppliers = data;
    } else {
      state.suppliers = SEED;
      try { await apiPut(SEED); } catch {}
    }
  } catch (e) {
    console.error(e);
    state.suppliers = SEED;
    const banner = el('div', { className: 'banner' }, 'データの読み込みに失敗しました');
    document.getElementById('main').appendChild(banner);
    setTimeout(() => banner.remove(), 5000);
  }
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  setTab('map');
}

const GATE_PW = 'mondocolo2026';
const GATE_KEY = 'supplier_map_auth';

function checkGate() {
  if (sessionStorage.getItem(GATE_KEY) === '1') {
    startApp();
    return;
  }
  document.getElementById('gate').style.display = 'flex';

  const pwInput = document.getElementById('gatePw');
  const btn = document.getElementById('gateBtn');
  const err = document.getElementById('gateErr');

  function tryLogin() {
    if (pwInput.value === GATE_PW) {
      sessionStorage.setItem(GATE_KEY, '1');
      document.getElementById('gate').style.display = 'none';
      startApp();
    } else {
      err.style.display = 'block';
      pwInput.value = '';
      pwInput.focus();
    }
  }

  btn.onclick = tryLogin;
  pwInput.onkeydown = e => { if (e.key === 'Enter') tryLogin(); };
  pwInput.focus();
}

function startApp() {
  document.getElementById('splash').style.display = 'flex';
  init();
}

checkGate();
</script>
