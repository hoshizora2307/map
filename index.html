<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MONDOCOLO CLOUD CORE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background-color: #000; color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        #auth-terminal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .matrix-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            opacity: 0.03; font-size: 10px; overflow: hidden; pointer-events: none; word-break: break-all;
        }
        .auth-box {
            border: 1px solid #00ff00; padding: 40px; background: #050505;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); max-width: 450px; width: 90%; z-index: 2;
            border-radius: 4px;
        }
        .console-status { color: #ff0055; animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #app-root { display: none; flex-direction: column; height: 100vh; width: 100%; }
        header {
            padding: 10px; border-bottom: 1px solid #00ff00;
            display: flex; justify-content: space-between; align-items: center;
            background-color: #0a0a0a; height: 50px; z-index: 10;
        }
        .toggle-btn {
            background-color: #002200; color: #00ff00; border: 1px solid #00ff00;
            padding: 5px 10px; cursor: pointer; font-family: monospace; font-weight: bold;
        }
        .main-container { position: relative; flex: 1; width: 100%; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: #eee; }
        .sidebar {
            position: absolute; top: 0; left: 0; width: 100%; max-width: 380px; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); border-right: 1px solid #00ff00;
            display: flex; flex-direction: column; padding: 15px; overflow-y: auto; gap: 20px;
            z-index: 5; transition: transform 0.3s ease; transform: translateX(-100%);
        }
        .sidebar.active { transform: translateX(0); }
        .section-title { font-size: 0.95rem; font-weight: bold; border-left: 4px solid #00ff00; padding-left: 8px; }
        .panel-block { border: 1px solid #003300; padding: 12px; background-color: #050505; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; font-size: 0.85rem; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; min-width: 0; }
        select, input {
            background-color: #000; color: #00ff00; border: 1px solid #00ff00;
            padding: 12px; font-family: monospace; width: 100%; font-size: 1.1rem; outline: none;
            border-radius: 4px;
        }
        .action-btn {
            background-color: #00ff00; color: #000; border: 1px solid #00ff00;
            padding: 14px; cursor: pointer; font-family: monospace; font-weight: bold; width: 100%;
            font-size: 1.1rem; border-radius: 4px; transition: all 0.2s;
        }
        .action-btn:hover { background-color: #00aa00; box-shadow: 0 0 15px #00ff00; }
        footer { padding: 8px; text-align: center; background-color: #0a0a0a; border-top: 1px solid #00ff00; font-size: 0.7rem; height: 35px; }
        @media (min-width: 992px) {
            .toggle-btn { display: none; }
            .sidebar { position: relative; transform: translateX(0); width: 360px; }
            .main-container { display: flex; flex-direction: row; }
            #map { position: relative; flex: 1; }
        }
    </style>
</head>
<body>

    <div id="auth-terminal">
        <div class="matrix-bg" id="matrix-code"></div>
        <div class="auth-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <span class="console-status">[ STATUS: CLOUD_ENCRYPTED ]</span>
                <h2 style="color: #00ff00; margin: 10px 0 0 0; font-size: 1.6rem; text-shadow: 0 0 10px #00ff00; letter-spacing: 1px;">MONDOCOLO CLOUD CORE</h2>
            </div>
            <p style="color: #888; font-size: 0.8rem; line-height: 1.5; margin-bottom: 25px;">
                RESTRICTED AREA: 本システムは株式会社MONDOCOLOの社外秘情報です。アクセスには認可された暗号化セキュリティキーの入力が必要です。
            </p>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <label style="font-size: 0.85rem; color: #00ff00; font-weight: bold;">SYS_ACCESS_KEY :</label>
                <input type="text" id="passkey" style="text-align: center; font-size: 1.3rem; letter-spacing: 2px;" autofocus placeholder="mondocolo2026">
                <button type="button" class="action-btn" id="connect-btn">CONNECT_TO_CORE();</button>
            </div>
            <div id="auth-log" style="color: #ff0055; font-size: 0.85rem; margin-top: 15px; text-align: center; font-family: monospace; min-height: 20px;"></div>
        </div>
    </div>

    <div id="app-root">
        <header>
            <h1>[ 信州マルシェ 開催マップ ]</h1>
            <button class="toggle-btn" id="toggle-panel-btn" onclick="toggleSidebar()">[ MENU_OPEN ]</button>
        </header>

        <div class="main-container">
            <div class="sidebar" id="sidebar-panel">
                <div>
                    <div class="section-title">// FILTER_SYSTEM</div>
                    <div class="panel-block">
                        <div class="form-row">
                            <div class="form-group"><label>開催年</label><select id="filter-year"><option value="">ALL</option><option value="2024">2024年</option><option value="2025">2025年</option><option value="2026">2026年</option><option value="2027">2027年</option></select></div>
                            <div class="form-group"><label>開催月</label><select id="filter-month"><option value="">ALL</option><option value="01">1月</option><option value="02">2月</option><option value="03">3月</option><option value="04">4月</option><option value="05">5月</option><option value="06">6月</option><option value="07">7月</option><option value="08">8月</option><option value="09">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select></div>
                        </div>
                        <div class="form-group"><label>都道府県</label><select id="filter-pref"><option value="">ALL</option><option value="東京都">東京都</option><option value="長野県">長野県</option><option value="大阪府">大阪府</option><option value="北海道">北海道</option><option value="福岡県">福岡県</option></select></div>
                        <div class="form-group"><label>施設カテゴリ</label><select id="filter-category"><option value="">ALL</option><option value="道の駅">道の駅</option><option value="JA">JA</option><option value="イベント">イベント</option><option value="その他">その他</option></select></div>
                    </div>
                </div>

                <div>
                    <div class="section-title">// REALTIME_DATA_INPUT</div>
                    <div class="panel-block">
                        <form id="input-form" onsubmit="event.preventDefault(); pushNewNode();">
                            <div class="form-group"><label>施設名</label><input type="text" id="in-name" required /></div>
                            <div class="form-row">
                                <div class="form-group"><label>担当者名</label><input type="text" id="in-manager" required /></div>
                                <div class="form-group"><label>施設電話番号</label><input type="tel" id="in-phone" required /></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>開催日</label><input type="date" id="in-date" required /></div>
                                <div class="form-group"><label>売上金額 [¥]</label><input type="number" id="in-sales" required min="0" /></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>都道府県</label><select id="in-pref" required><option value="東京都">東京都</option><option value="長野県">長野県</option><option value="大阪府">大阪府</option><option value="北海道">北海道</option><option value="福岡県">福岡県</option></select></div>
                                <div class="form-group"><label>カテゴリ</label><select id="in-category" required><option value="道の駅">道の駅</option><option value="JA">JA</option><option value="イベント">イベント</option><option value="その他">その他</option></select></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>緯度 [LAT]</label><input type="number" step="any" id="in-lat" required /></div>
                                <div class="form-group"><label>経度 [LNG]</label><input type="number" step="any" id="in-lng" required /></div>
                            </div>
                            <button type="submit" class="action-btn" style="font-size:0.9rem; padding:10px;">PUSH_TO_SUPABASE();</button>
                        </form>
                    </div>
                </div>
            </div>
            <div id="map"></div>
        </div>
        <footer>Credit: 信州マルシェ 開催マップポータル</footer>
    </div>

    <script>
        const bg = document.getElementById('matrix-code');
        for(let i=0; i<30; i++) bg.innerHTML += Math.random().toString(16).substring(2).toUpperCase() + " ";

        const SUPABASE_URL = "https://nmfwsiihyyppjsuiomxt.supabase.co";
        const SUPABASE_KEY = "";
        
        let supabase = null;
        try {
            if(window.supabase && SUPABASE_URL && SUPABASE_KEY) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) {}

        let map, currentMarkers = [], locationsData = [];

        function requestSystemAccess() {
            const pass = document.getElementById('passkey').value.trim().toLowerCase();
            const log = document.getElementById('auth-log');
            log.style.color = "#00ff00"; log.innerText = "AUTHENTICATING... PLEASE WAIT.";

            if (pass === "mondocolo2026") { 
                log.innerText = "ACCESS GRANTED. FETCHING DATA...";
                document.getElementById('auth-terminal').style.display = 'none';
                document.getElementById('app-root').style.display = 'flex';
                try {
                    initMapSystem();
                } catch(mapErr) {}
            } else {
                log.style.color = "#ff0055"; log.innerText = "CRITICAL_ERROR: INVALID_KEY.";
                document.getElementById('passkey').value = "";
            }
        }

        document.getElementById('connect-btn').addEventListener('click', requestSystemAccess);
        document.getElementById('passkey').addEventListener('keypress', (e) => { if(e.key==='Enter') requestSystemAccess(); });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-panel');
            const btn = document.getElementById('toggle-panel-btn');
            sidebar.classList.toggle('active');
            btn.innerText = sidebar.classList.contains('active') ? "[ MENU_CLOSE ]" : "[ MENU_OPEN ]";
        }

        async function initMapSystem() {
            if (map) return;
            map = L.map('map', { tap: false }).setView([36.5, 138.0], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

            map.on('contextmenu click', function(e) {
                document.getElementById('in-lat').value = e.latlng.lat.toFixed(6);
                document.getElementById('in-lng').value = e.latlng.lng.toFixed(6);
                if (window.innerWidth < 992) toggleSidebar();
            });

            ['filter-year', 'filter-month', 'filter-pref', 'filter-category'].forEach(id => {
                document.getElementById(id).addEventListener('change', filterData);
            });

            await pullCloudData();
        }

        async function pullCloudData() {
            if(!supabase) {
                showDemoData();
                return;
            }
            try {
                const { data, error } = await supabase.from('locations').select('*');
                if (error) {
                    showDemoData();
                } else {
                    locationsData = data || [];
                    filterData();
                }
            } catch(e) {
                showDemoData();
            }
        }

        function showDemoData() {
            locationsData = [{ id: 1, lat: 36.5, lng: 138.0, name: "長野県拠点(デモデータ)", manager: "管理者", phone: "000-000-0000", date: "2026-06-18", pref: "長野県", category: "その他", sales: 1200000 }];
            filterData();
        }

        function getPinColor(sales) {
            if (sales >= 1000000) return '#ff003c';
            if (sales >= 500000)  return '#ff9900';
            return '#0099ff';
        }

        function filterData() {
            const y = document.getElementById('filter-year').value;
            const m = document.getElementById('filter-month').value;
            const p = document.getElementById('filter-pref').value;
            const c = document.getElementById('filter-category').value;

            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            locationsData.filter(loc => {
                if(!loc.date) return false;
                const ly = loc.date.substring(0, 4), lm = loc.date.substring(5, 7);
                return (y===""||ly===y) && (m===""||lm===m) && (p===""||loc.pref===p) && (c===""||loc.category===c);
            }).forEach(loc => {
                const color = getPinColor(loc.sales);
                const customIcon = L.divIcon({
                    className: "custom-pin", iconAnchor: [9, 9], popupAnchor: [0, -10],
                    html: `<span style="background-color:${color}; width:18px; height:18px; display:block; border-radius:50%; box-shadow:0 0 10px ${color}; border:2px solid #fff;" />`
                });
                const marker = L.marker([loc.lat, loc.lng], { icon: customIcon }).addTo(map);
                marker.bindPopup(`
                    <div style="color:#00ff00; font-family:monospace;">
                        <strong style="color:#fff; font-size:1rem;">${loc.name}</strong><br><hr style="border-color:#003300; margin:6px 0;">
                        <strong>[担当]</strong> ${loc.manager}<br><strong>[TEL]</strong> ${loc.phone}<br><strong>[日程]</strong> ${loc.date}<br><strong>[売上]</strong> ¥${Number(loc.sales).toLocaleString()}
                    </div>
                `);
                currentMarkers.push(marker);
            });
        }

        async function pushNewNode() {
            const newLoc = {
                name: document.getElementById('in-name').value,
                manager: document.getElementById('in-manager').value,
                phone: document.getElementById('in-phone').value,
                date: document.getElementById('in-date').value,
                sales: parseInt(document.getElementById('in-sales').value, 10),
                pref: document.getElementById('in-pref').value,
                category: document.getElementById('in-category').value,
                lat: parseFloat(document.getElementById('in-lat').value),
                lng: parseFloat(document.getElementById('in-lng').value)
            };

            if(supabase) {
                const { error } = await supabase.from('locations').insert([newLoc]);
                if (error) {
                    alert("PUSH FAILED: " + error.message);
                    return;
                }
                await pullCloudData();
            } else {
                newLoc.id = Date.now();
                locationsData.push(newLoc);
                filterData();
            }
            
            document.getElementById('input-form').reset();
            if (window.innerWidth < 992) toggleSidebar();
            map.setView([newLoc.lat, newLoc.lng], 12);
            alert("SYSTEM: DATA PUSH SUCCESS.");
        }
    </script>
</body>
</html>
